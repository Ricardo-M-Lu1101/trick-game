<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>敢点我吗？😝</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
            font-family: system-ui, -apple-system, sans-serif;
            background: #f5f5f5;
        }
        h2 {
            text-align: center;
            margin-top: 12vh;
            font-size: clamp(20px, 6vw, 26px);
            color: #333;
        }
        #trick-btn {
            position: absolute;
            padding: 14px 28px;
            font-size: 17px;
            background: pink;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.15s ease;
            touch-action: none;
            user-select: none;
            z-index: 100;
        }
        .func-btn {
            position: fixed;
            padding: 11px 0;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            z-index: 9999;
            width: 115px;
            text-align: center;
            touch-action: manipulation;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        #view-record {
            bottom: 20px;
            right: 15px;
            background: #4CAF50;
        }
        #upload-record {
            bottom: 68px;
            right: 15px;
            background: #2196F3;
        }
        .auto-tip {
            position: fixed;
            bottom: 118px;
            right: 15px;
            background: #ff9800;
            color: #fff;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 11px;
            z-index: 9999;
            display: none;
        }
        .record-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 99999;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 25px 20px;
            border-radius: 12px;
            width: 92%;
            max-height: 75vh;
            overflow-y: auto;
        }
        .close-modal {
            float: right;
            font-size: 24px;
            cursor: pointer;
            color: #666;
            line-height: 1;
        }
        .modal-content h3 {
            margin-bottom: 20px;
            font-size: 18px;
        }
        .record-item {
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
            word-break: break-all;
            line-height: 1.5;
        }
        .register-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.75);
            z-index: 999999;
            justify-content: center;
            align-items: center;
        }
        .register-content {
            background: white;
            padding: 40px 25px;
            border-radius: 12px;
            width: 90%;
            text-align: center;
        }
        .register-content h3 {
            margin-bottom: 20px;
            font-size: 19px;
        }
        .register-content input {
            width: 100%;
            padding: 14px;
            margin: 20px 0;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
        .register-content button {
            width: 100%;
            padding: 13px 0;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h2>有本事你点到我！😜</h2>
    <button id="trick-btn">点我呀！</button>

    <button class="func-btn" id="view-record">查看记录 📝</button>
    <button class="func-btn" id="upload-record">一键上传 📤</button>
    <div class="auto-tip" id="autoTip">自动检查中...</div>

    <div class="record-modal" id="recordModal">
        <div class="modal-content">
            <span class="close-modal" id="closeModal">&times;</span>
            <h3>操作记录</h3>
            <div id="recordList"></div>
        </div>
    </div>

    <div class="register-modal" id="registerModal">
        <div class="register-content">
            <h3>请输入你的名字</h3>
            <input type="text" id="userNameInput" placeholder="比如：小明" maxlength="10">
            <br>
            <button id="confirmNameBtn">确认</button>
        </div>
    </div>

<script>
    const COLLECT_URL = "https://docs.qq.com/form/fill/DQmp5ZG1mbUtOR2py";
    const FIELD_USER = "$1";
    const FIELD_TIME = "$2";
    const FIELD_ACTION = "$3";

    let userName = localStorage.getItem('currentUserName') || '';
    let trickRecords = JSON.parse(localStorage.getItem('trickRecords')) || [];
    let uploadedCount = parseInt(localStorage.getItem('uploadedCount') || 0);
    
    const autoTip = document.getElementById('autoTip');
    const btn = document.getElementById('trick-btn');
    const registerModal = document.getElementById('registerModal');
    const userNameInput = document.getElementById('userNameInput');
    const confirmNameBtn = document.getElementById('confirmNameBtn');
    const recordModal = document.getElementById('recordModal');
    const closeModal = document.getElementById('closeModal');
    const viewRecordBtn = document.getElementById('view-record');
    const uploadRecordBtn = document.getElementById('upload-record');
    
    let maxLeft = window.innerWidth - btn.offsetWidth - 20;
    let maxTop = window.innerHeight - btn.offsetHeight - 20;

    window.onload = function () {
        if (!userName) {
            registerModal.style.display = 'flex';
        } else {
            addRecord('打开了整蛊页面！');
        }
        renderRecords();
    };

    confirmNameBtn.onclick = function () {
        const inputName = userNameInput.value.trim();
        if (!inputName) {
            alert('请输入你的名字哦！');
            return;
        }
        userName = inputName;
        localStorage.setItem('currentUserName', userName);
        registerModal.style.display = 'none';
        addRecord('打开了整蛊页面！');
    };

    userNameInput.onkeydown = function (e) {
        if (e.key === 'Enter') confirmNameBtn.onclick();
    };

    function moveBtn() {
        const randomX = Math.floor(Math.random() * maxLeft);
        const randomY = Math.floor(Math.random() * maxTop);
        btn.style.left = randomX + 'px';
        btn.style.top = randomY + 'px';
        btn.style.transform = 'translate(0, 0)';
        addRecord('试图点击按钮，按钮逃跑啦！');
    }

    btn.onmouseover = moveBtn;
    btn.ontouchstart = function (e) {
        e.preventDefault();
        moveBtn();
    };

    btn.ondblclick = function () {
        btn.style.left = '50%';
        btn.style.top = '50%';
        btn.style.transform = 'translate(-50%, -50%)';
        addRecord('双击按钮成功，按钮回到原位！');
    };

    function addRecord(action) {
        const now = new Date();
        const timeStr = now.getFullYear() + "-" +
            String(now.getMonth()+1).padStart(2,'0') + "-" +
            String(now.getDate()).padStart(2,'0') + " " +
            String(now.getHours()).padStart(2,'0') + ":" +
            String(now.getMinutes()).padStart(2,'0') + ":" +
            String(now.getSeconds()).padStart(2,'0');

        const newRecord = {
            userName: userName,
            time: timeStr,
            action: action
        };

        trickRecords.push(newRecord);
        localStorage.setItem('trickRecords', JSON.stringify(trickRecords));
        renderRecords();
    }

    function renderRecords() {
        const recordList = document.getElementById('recordList');
        recordList.innerHTML = '';

        if (trickRecords.length === 0) {
            recordList.innerHTML = '<p style="color:#999;text-align:center;padding:20px 0;">暂无操作记录～</p>';
            return;
        }

        trickRecords.slice().reverse().forEach((item, index) => {
            const recordItem = document.createElement('div');
            recordItem.className = 'record-item';
            recordItem.innerHTML = `<strong>${trickRecords.length - index}.</strong> [${item.time}] ${item.userName}：${item.action}`;
            recordList.appendChild(recordItem);
        });
    }

    viewRecordBtn.onclick = function () {
        recordModal.style.display = 'flex';
    };
    closeModal.onclick = function () {
        recordModal.style.display = 'none';
    };
    recordModal.onclick = function (e) {
        if (e.target === recordModal) {
            recordModal.style.display = 'none';
        }
    };

    uploadRecordBtn.onclick = async function () {
        const newRecords = trickRecords.slice(uploadedCount);
        if (newRecords.length === 0) return;

        for (let record of newRecords) {
            await submitSingleRecord(record);
        }

        uploadedCount = trickRecords.length;
        localStorage.setItem('uploadedCount', uploadedCount);
    };

    function submitSingleRecord(record) {
        return new Promise(resolve => {
            const form = document.createElement("form");
            form.action = COLLECT_URL;
            form.method = "POST";
            form.target = "_blank";
            form.style.display = "none";

            const u = document.createElement("input");
            u.type = "hidden"; u.name = FIELD_USER; u.value = record.userName;
            form.appendChild(u);

            const t = document.createElement("input");
            t.type = "hidden"; t.name = FIELD_TIME; t.value = record.time;
            form.appendChild(t);

            const a = document.createElement("input");
            a.type = "hidden"; a.name = FIELD_ACTION; a.value = record.action;
            form.appendChild(a);

            document.body.appendChild(form);
            form.submit();
            document.body.removeChild(form);
            setTimeout(resolve, 300);
        });
    }

    window.addEventListener('resize', () => {
        maxLeft = window.innerWidth - btn.offsetWidth - 20;
        maxTop = window.innerHeight - btn.offsetHeight - 20;
    });
</script>
</body>
</html>
