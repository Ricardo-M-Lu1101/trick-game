<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>敢点我吗？😝</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5f5f5;
            font-family: system-ui, -apple-system, sans-serif;
            text-align: center;
            overflow: hidden;
            height: 100vh;
        }
        h2 {
            margin-top: 12vh;
            font-size: 22px;
            color: #333;
        }
        #trick-btn {
            position: absolute;
            padding: 14px 28px;
            background: pink;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            transition: left 0.15s, top 0.15s;
            touch-action: none;
            z-index: 99;
            cursor: pointer;
            white-space: nowrap;
        }
        .btn {
            position: fixed;
            bottom: 20px;
            padding: 10px;
            color: white;
            background: #2196F3;
            border: none;
            border-radius: 6px;
            width: 120px;
            z-index: 100;
            font-size: 14px;
        }
        #view {
            right: 150px;
            background: #4CAF50;
        }
        #upload {
            right: 20px;
        }
        #result {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-height: 300px;
            overflow-y: auto;
            background: #fff;
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 0 8px rgba(0,0,0,0.15);
            text-align: left;
            font-size: 12px;
            display: none;
            white-space: pre-wrap;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<h2>有本事你点到我！😜</h2>
<button id="trick-btn">点我呀！</button>
<button id="view" class="btn">查看记录</button>
<button id="upload" class="btn">一键上传</button>
<pre id="result"></pre>

<script>
    let name = "";
    let records = [];
    const btn = document.getElementById("trick-btn");
    const result = document.getElementById("result");

    // 修复：取消不会死循环
    while (!name || !name.trim()) {
        name = prompt("请输入你的名字：");
        if (name === null) {
            name = "匿名用户";
            break;
        }
    }

    // 安全获取范围
    function getMaxRange() {
        return {
            maxX: window.innerWidth - btn.offsetWidth - 20,
            maxY: window.innerHeight - btn.offsetHeight - 20
        };
    }

    // 按钮逃跑
    function move() {
        const { maxX, maxY } = getMaxRange();
        btn.style.left = Math.random() * maxX + "px";
        btn.style.top = Math.random() * maxY + "px";
        addRecord("尝试点击按钮");
    }

    btn.onmouseover = move;
    btn.ontouchstart = (e) => {
        e.preventDefault();
        move();
    };

    btn.ondblclick = () => {
        addRecord("成功点到按钮！");
    };

    // 添加记录
    function addRecord(text) {
        const time = new Date().toLocaleString();
        records.push(`[${time}] ${name}：${text}`);
    }

    // 查看记录
    document.getElementById("view").onclick = () => {
        result.textContent = records.join("\n") || "暂无操作记录";
        result.style.display = "block";
    };

    // 一键上传（本地输出，不弹窗、不跳转）
    document.getElementById("upload").onclick = () => {
        if (records.length === 0) {
            result.textContent = "暂无记录可上传";
            result.style.display = "block";
            return;
        }
        result.textContent = "✅ 自动上传完成（本地记录）：\n\n" + records.join("\n");
        result.style.display = "block";
    };
</script>
</body>
</html>
