<!DOCTYPE html>
<html>
<head>
<style>
  #trick-btn {
    position: absolute;
    padding: 15px 30px;
    font-size: 18px;
    background: pink;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    transition: all 0.2s ease;
  }

  .func-btn {
    position: fixed;
    padding: 10px 20px;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 14px;
    z-index: 9999;
    width: 130px;
    text-align: center;
  }
  #view-record {
    bottom: 20px;
    right: 20px;
    background: #4CAF50;
  }
  #upload-record {
    bottom: 70px;
    right: 20px;
    background: #2196F3;
  }

  .record-modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 99999;
    justify-content: center;
    align-items: center;
  }
  .modal-content {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 80%;
    max-width: 500px;
    max-height: 70vh;
    overflow-y: auto;
  }
  .close-modal {
    float: right;
    font-size: 20px;
    cursor: pointer;
    color: #666;
  }
  .record-item {
    padding: 8px 0;
    border-bottom: 1px solid #eee;
    font-size: 14px;
  }

  .register-modal {
    display: flex;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    z-index: 999999;
    justify-content: center;
    align-items: center;
  }
  .register-content {
    background: white;
    padding: 40px;
    border-radius: 10px;
    width: 80%;
    max-width: 400px;
    text-align: center;
  }
  .register-content input {
    width: 80%;
    padding: 10px;
    margin: 15px 0;
    font-size: 16px;
    border: 1px solid #ddd;
    border-radius: 5px;
  }
  .register-content button {
    padding: 10px 30px;
    background: #2196F3;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
  }

  .auto-tip {
    position: fixed;
    bottom: 120px;
    right: 20px;
    background: #ff9800;
    color: #fff;
    padding: 6px 12px;
    border-radius: 4px;
    font-size: 12px;
    z-index: 9999;
  }
</style>
</head>
<body>
  <h2>敢点我吗？😝</h2>
  <button id="trick-btn">点我呀！</button>

  <button class="func-btn" id="view-record">查看整蛊记录 📝</button>
  <button class="func-btn" id="upload-record">一键上传记录 📤</button>
  <div class="auto-tip" id="autoTip" style="display:none;">自动检查中...</div>

  <div class="record-modal" id="recordModal">
    <div class="modal-content">
      <span class="close-modal" id="closeModal">&times;</span>
      <h3>整蛊操作记录</h3>
      <div id="recordList"></div>
    </div>
  </div>

  <div class="register-modal" id="registerModal">
    <div class="register-content">
      <h3>请输入你的名字</h3>
      <input type="text" id="userNameInput" placeholder="比如：小明" maxlength="10">
      <br>
      <button id="confirmNameBtn">确认</button>
    </div>
  </div>

<script>
  // ======================
  // 你的邮箱（已填好）
  // ======================
  const YOUR_EMAIL = "1962583744@qq.com";

  let userName = localStorage.getItem('currentUserName') || '';
  let trickRecords = JSON.parse(localStorage.getItem('trickRecords')) || [];
  
  // 记录已经上传过的条数，避免重复发
  let uploadedCount = parseInt(localStorage.getItem('uploadedCount') || 0);

  const autoTip = document.getElementById('autoTip');

  // ========== 注册逻辑 ==========
  const registerModal = document.getElementById('registerModal');
  const userNameInput = document.getElementById('userNameInput');
  const confirmNameBtn = document.getElementById('confirmNameBtn');

  window.onload = function () {
    if (!userName) {
      registerModal.style.display = 'flex';
    } else {
      addRecord('打开了整蛊页面！');
      startAutoCheck(); // 启动自动检查
    }
  };

  confirmNameBtn.onclick = function () {
    const inputName = userNameInput.value.trim();
    if (!inputName) {
      alert('请输入你的名字哦！');
      return;
    }
    userName = inputName;
    localStorage.setItem('currentUserName', userName);
    registerModal.style.display = 'none';
    addRecord('打开了整蛊页面！');
    startAutoCheck(); // 启动自动检查
  };

  userNameInput.onkeydown = function (e) {
    if (e.key === 'Enter') confirmNameBtn.click();
  };

  // ========== 按钮逃跑逻辑 ==========
  const btn = document.getElementById('trick-btn');
  btn.onmouseover = function () {
    const randomX = Math.random() * (window.innerWidth - 120);
    const randomY = Math.random() * (window.innerHeight - 60);
    btn.style.left = randomX + 'px';
    btn.style.top = randomY + 'px';
    addRecord('鼠标试图点击按钮，按钮逃跑啦！');
  };

  btn.ondblclick = function () {
    alert('算你厉害！😜');
    btn.style.left = '50%';
    btn.style.top = '50%';
    addRecord('双击按钮成功，按钮回到原位！');
  };

  // ========== 添加记录 ==========
  function addRecord(action) {
    const now = new Date();
    const timeStr = now.getFullYear() + "-" +
      String(now.getMonth() + 1).padStart(2, '0') + "-" +
      String(now.getDate()).padStart(2, '0') + " " +
      String(now.getHours()).padStart(2, '0') + ":" +
      String(now.getMinutes()).padStart(2, '0') + ":" +
      String(now.getSeconds()).padStart(2, '0');

    const newRecord = {
      userName: userName,
      time: timeStr,
      action: action
    };

    trickRecords.push(newRecord);
    localStorage.setItem('trickRecords', JSON.stringify(trickRecords));
  }

  // ========== 渲染记录 ==========
  function renderRecords() {
    const recordList = document.getElementById('recordList');
    recordList.innerHTML = '';

    if (trickRecords.length === 0) {
      recordList.innerHTML = '<p style="color:#999;">暂无操作记录～</p>';
      return;
    }

    trickRecords.forEach((item, index) => {
      const recordItem = document.createElement('div');
      recordItem.className = 'record-item';
      recordItem.innerHTML = `<strong>${index+1}.</strong> [${item.time}] ${item.userName}：${item.action}`;
      recordList.appendChild(recordItem);
    });
  }

  // ================================
  // 一键上传（稳定版）
  // ================================
  const uploadRecordBtn = document.getElementById('upload-record');
  uploadRecordBtn.onclick = function () {
    doUpload();
  };

  function doUpload() {
    if (!userName || trickRecords.length === 0) return;

    let content = `=== 整蛊游戏自动上传记录 ===\n`;
    content += `用户：${userName}\n`;
    content += `上传时间：${new Date().toLocaleString()}\n\n`;

    trickRecords.forEach((item, i) => {
      content += `${i+1}. [${item.time}] ${item.userName}：${item.action}\n`;
    });

    // 调用系统邮箱，100%成功
    const link = document.createElement('a');
    link.href = `mailto:${YOUR_EMAIL}?subject=整蛊游戏记录-${userName}&body=${encodeURIComponent(content)}`;
    link.click();

    // 标记已上传条数
    uploadedCount = trickRecords.length;
    localStorage.setItem('uploadedCount', uploadedCount);
  }

  // ================================
  // 核心：自动定时检查（每10秒）
  // ================================
  function startAutoCheck() {
    setInterval(() => {
      if (!userName) return;
      autoTip.style.display = 'block';

      // 如果有新记录没上传 → 自动上传
      if (trickRecords.length > uploadedCount) {
        doUpload();
      }

      setTimeout(() => {
        autoTip.style.display = 'none';
      }, 2000);
    }, 10000); // 10秒检查一次
  }

  // ========== 弹窗控制 ==========
  const recordModal = document.getElementById('recordModal');
  const viewRecordBtn = document.getElementById('view-record');
  const closeModalBtn = document.getElementById('closeModal');

  viewRecordBtn.onclick = function () {
    renderRecords();
    recordModal.style.display = 'flex';
  };

  closeModalBtn.onclick = function () {
    recordModal.style.display = 'none';
  };

  window.onclick = function (event) {
    if (event.target === recordModal) recordModal.style.display = 'none';
  };
</script>
</body>
</html>
