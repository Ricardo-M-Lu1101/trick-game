<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>敢点我吗？😝</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
            font-family: system-ui, -apple-system, sans-serif;
            background: #f5f5f5;
        }
        h2 {
            text-align: center;
            margin-top: 12vh;
            font-size: clamp(20px, 6vw, 26px);
            color: #333;
        }
        #trick-btn {
            position: absolute;
            padding: 14px 28px;
            font-size: 17px;
            background: pink;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.15s ease;
            touch-action: none;
            user-select: none;
        }
        .func-btn {
            position: fixed;
            padding: 11px 0;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            z-index: 9999;
            width: 115px;
            text-align: center;
            touch-action: manipulation;
